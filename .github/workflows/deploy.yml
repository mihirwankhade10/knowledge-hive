# =============================================================================
# KnowledgeHive — CD Pipeline (Deploy to Azure VM)
# Runs on push to main branch after CI passes
#
# Connects to your Azure VM via SSH and:
#   1. Pulls latest code from GitHub
#   2. Rebuilds and restarts Docker Compose services
#
# Required GitHub Secrets (set in repo Settings → Secrets → Actions):
#   - AZURE_VM_HOST     → Your VM's public IP or hostname
#   - AZURE_VM_USER     → SSH username (e.g., azureuser)
#   - AZURE_VM_SSH_KEY  → Private SSH key for authentication
#   - ENV_FILE          → Contents of your production .env file
# =============================================================================

name: CD — Deploy to Azure VM

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Only one deploy at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Wait for CI to pass first
  ci-check:
    name: ✅ CI Status
    runs-on: ubuntu-latest
    steps:
      - name: CI must pass before deploy
        run: echo "CI checks passed, proceeding to deploy"

  deploy:
    name: 🚀 Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: ci-check

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            echo "═══════════════════════════════════════════"
            echo "  KnowledgeHive — Deploying latest version"
            echo "═══════════════════════════════════════════"

            # Navigate to project directory
            cd ~/knowledge-hive || cd ~/microsoft-hackathon/knowledge-hive || {
              echo "❌ Project directory not found!"
              exit 1
            }

            # Pull latest code
            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # Update .env if provided
            if [ -n "${{ secrets.ENV_FILE }}" ]; then
              echo "🔐 Updating .env file..."
              echo '${{ secrets.ENV_FILE }}' > .env
            fi

            # Rebuild and restart containers
            echo "🐳 Rebuilding Docker containers..."
            sudo docker compose down

            # Free disk space: remove dangling images and stale build cache
            # left over from previous builds (prevents "no space left on device").
            echo "🧹 Cleaning up old Docker images and build cache..."
            echo "Disk before cleanup:"
            df -h / | tail -1
            sudo docker image prune -f
            sudo docker builder prune -f
            echo "Disk after cleanup:"
            df -h / | tail -1

            sudo docker compose up -d --build

            # Wait for services to be healthy (Neo4j needs ~45s)
            echo "⏳ Waiting for services to start..."
            sleep 45

            # Verify containers are actually running
            echo "📋 Container status:"
            sudo docker compose ps

            # Fail deploy if any expected service exited
            EXITED=$(sudo docker compose ps --status=exited --format json 2>/dev/null | grep -c '"Name"' || true)
            if [ "$EXITED" -gt "0" ]; then
              echo "❌ One or more containers exited unexpectedly. Logs:"
              sudo docker compose logs --tail=50
              exit 1
            fi

            # Quick health check
            echo "🏥 Running health check..."
            curl -sf http://localhost:8000/api/health && echo "✅ Backend is healthy!" || echo "⚠️ Backend health check failed (may still be starting)"

            echo ""
            echo "═══════════════════════════════════════════"
            echo "  ✅ Deployment complete!"
            echo "═══════════════════════════════════════════"

      - name: Post-deploy notification
        if: success()
        run: echo "🎉 Successfully deployed to Azure VM"

      - name: Deploy failure notification
        if: failure()
        run: echo "❌ Deployment to Azure VM failed — check logs above"

version: "3.8"

# =============================================================================
# KnowledgeHive - Docker Compose
# Phase 3: Redis + Celery worker activated
# =============================================================================

services:
  # --- Backend (FastAPI) ---
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./uploads:/app/uploads
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - knowledgehive

  # --- Frontend (Vite + React) ---
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - knowledgehive

  # --- Qdrant Vector Database ---
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - knowledgehive

  # --- Neo4j Graph Database ---
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/knowledgehive
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowledgehive

  # --- Redis (Phase 3: Caching + Celery Broker + Pub/Sub) ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - knowledgehive

  # --- Celery Worker (Phase 3: Background Document Ingestion) ---
  celery_worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: celery -A backend.worker.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./uploads:/app/uploads
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
    networks:
      - knowledgehive

  # --- Prometheus (Phase 4: Observability) ---
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - backend
    networks:
      - knowledgehive

volumes:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  prometheus_data:

networks:
  knowledgehive:
    driver: bridge
